- name: Buat user sistem node_exporter (non-login)
  user:
    name: node_exporter
    shell: /bin/false
    system: yes
    create_home: no

- name: Download Node Exporter binary
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    checksum: "sha256:6809dd0b3ec45fd6e992c19071d6b5253aed3ead7bf0686885a51d85c6643c66"

- name: Extract binary
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install binary ke /usr/local/bin
  copy:
    src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: yes

- name: Deploy systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify: restart node_exporter

- name: Enable & start service
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

- name: Buka port 9100 HANYA untuk IP Prometheus (UFW)
  ufw:
    rule: allow
    port: '9100'
    proto: tcp
    src: "{{ prometheus_ip }}"